# Grafana file-provisioned notification template — static (no envsubst substitution
# needed), installed as-is by install.sh. Referenced by the "hmdm-offline-report-webhook"
# contact point's settings.payload.template field (a full custom-payload webhook, not
# the built-in "message" field) as {{ template "hmdm_offline_report" . }} -- this produces
# the ENTIRE raw JSON body sent, e.g. Google Chat's {"text": "..."} shape, with nothing
# added by Grafana (no title, no "Open in Grafana" button, no version footer).
#
# The "Offline devices report" rule (see rules.yaml.tmpl) now returns ONE ROW PER OFFLINE
# DEVICE with only device_number/owner_name as labels and hours_offline as the query's
# numeric value -- deliberately NOT pre-aggregated by tier in SQL. An earlier version
# instead built one pre-formatted row per tier (heading + newline-joined device list)
# directly as label values; since those label values changed on nearly every evaluation
# as the embedded hour counts drifted, and an alert instance's identity (fingerprint) in
# Grafana/Alertmanager is its label set, each drift was treated as a new alert joining the
# group -- which re-triggered a notification via group_interval (5m) on almost every
# evaluation cycle instead of respecting the configured 4h repeat_interval. All
# tiering/counting/formatting has moved here, into the template, which runs once per
# notification and has no effect on alert identity.
#
# Uses Grafana's coll.Slice/coll.Append (build a list by appending, without mutating the
# original -- see https://grafana.com/docs/grafana/latest/alerting/configure-notifications/template-notifications/reference/)
# plus the built-in "join" function and Go template's native "len", so no arithmetic
# operators are needed anywhere (Go's text/template has none built in, and Grafana's own
# helper set isn't guaranteed to include Sprig-style add/sub). The three tier passes below
# each build their own list via range+if, then only emit a section at all if that list is
# non-empty, and the fixed gt12h -> lt12h -> lt1h emission order is what gives the required
# ordering, independent of whatever order .Alerts.Firing happens to be in.
#
# device lines are joined with a real "\n" via "join" directly (not the "~~~" delimiter
# trick the old design needed) since these are now built as ordinary template-local list
# values, never stored as a label -- so there's no risk of Grafana blanking a label that
# contains a newline.
apiVersion: 1

templates:
  - orgId: 1
    name: hmdm_offline_report
    template: |
      {{ define "hmdm_offline_report" }}
      {{- $total := len .Alerts.Firing -}}
      {{- $msg := printf "Offline Devices Report -- %d devices offline\n" $total -}}
      {{- $gt12h := coll.Slice -}}
      {{- $lt12h := coll.Slice -}}
      {{- $lt1h := coll.Slice -}}
      {{- range .Alerts.Firing -}}
      {{- $hrs := .Values.B -}}
      {{- $line := printf "%s -- %s -- %.0f hours" .Labels.device_number .Labels.owner_name $hrs -}}
      {{- if ge $hrs 12.0 -}}
      {{- $gt12h = coll.Append $line $gt12h -}}
      {{- else if ge $hrs 1.0 -}}
      {{- $lt12h = coll.Append $line $lt12h -}}
      {{- else -}}
      {{- $lt1h = coll.Append $line $lt1h -}}
      {{- end -}}
      {{- end -}}
      {{- if gt (len $gt12h) 0 -}}
      {{- $msg = printf "%s\n------------------------------------\nOffline > 12 hours (%d devices)\n------------------------------------\n%s\n" $msg (len $gt12h) (join "\n" $gt12h) -}}
      {{- end -}}
      {{- if gt (len $lt12h) 0 -}}
      {{- $msg = printf "%s\n------------------------------------\nOffline 1-12 hours (%d devices)\n------------------------------------\n%s\n" $msg (len $lt12h) (join "\n" $lt12h) -}}
      {{- end -}}
      {{- if gt (len $lt1h) 0 -}}
      {{- $msg = printf "%s\n------------------------------------\nOffline < 1 hour (%d devices)\n------------------------------------\n%s\n" $msg (len $lt1h) (join "\n" $lt1h) -}}
      {{- end -}}
      {"text": {{ data.ToJSON $msg }}}
      {{ end }}
