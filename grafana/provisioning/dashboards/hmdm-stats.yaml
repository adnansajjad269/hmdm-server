# Dashboard provider — creates the "HMDM Stats" folder (uid pinned; alert rules
# and the webpanel iframe URL rely on the dashboard living here).
apiVersion: 1

providers:
  - name: hmdm-stats
    orgId: 1
    folder: HMDM Stats
    folderUid: hmdm-stats
    type: file
    disableDeletion: true
    updateIntervalSeconds: 60
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards/hmdm-stats
