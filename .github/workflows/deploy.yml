name: Build and Deploy Headwind MDM

on:
  push:
    branches: [ "main" ] # Triggers whenever Claude commits to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '11' # Change to 17 or 8 depending on your Headwind version
        distribution: 'temurin'

    - name: Build with Gradle
      run: ./gradlew build

    - name: Upload WAR to Ubuntu Server and Restart Tomcat
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "build/libs/hmdm.war"
        target: "/tmp/" # Upload to temp folder first

    - name: Execute Deployment Script on Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          sudo cp /tmp/build/libs/hmdm.war /var/lib/tomcat9/webapps/ROOT.war
          sudo systemctl restart tomcat9
